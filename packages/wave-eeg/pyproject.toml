[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "wave-eeg"
version = "0.1.0"
description = "WaveAI — pacote de captação e análise de EEG (NeuroSky ThinkGear)"
requires-python = ">=3.9"
dependencies = ["numpy>=1.24", "scipy>=1.10"]

[project.optional-dependencies]
serial = ["pyserial>=3.5"]
dev = ["pytest>=7.0"]

[project.scripts]
wave-eeg = "wave_eeg.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
