[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "wave-corpus"
version = "0.1.0"
description = "WaveAI — corpus de pesquisa (store Parquet content-addressed + índice de metadados)"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "pyarrow>=14",
  "SQLAlchemy>=2.0",
  "pydantic-settings>=2.0",
]

[project.optional-dependencies]
# Índice em Postgres no deployment (ADR-0030); SQLite basta para local/testes.
postgres = ["psycopg[binary]>=3.1"]
# Versionamento real dos bytes num remote local (ADR-0030). Opcional: o resto do
# corpus funciona sem o binário — a identidade imutável já vem do hash de conteúdo.
dvc = ["dvc>=3.0"]
dev = ["pytest>=7.0"]

[project.scripts]
research = "wave_corpus.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
