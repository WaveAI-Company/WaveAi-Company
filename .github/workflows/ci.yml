name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-eeg-spike:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiments/eeg-capture-spike
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[serial,dev]"
      - name: Run tests
        run: pytest -q
