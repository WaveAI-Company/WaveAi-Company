name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-wave-eeg:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/wave-eeg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[serial,dev]"
      - name: Run tests
        run: pytest -q

  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  typecheck-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wave-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  test-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install wave-eeg (dependência local do monorepo)
        run: pip install -e ../../packages/wave-eeg
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
