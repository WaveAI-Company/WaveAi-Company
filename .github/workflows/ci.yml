name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-wave-eeg:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/wave-eeg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[serial,dev]"
      - name: Run tests
        run: pytest -q

  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      # Testes de persistência rodam contra Postgres real (o schema vem das
      # migrations). WAVEAI_TEST_REQUIRE_DB impede "verde por omissão".
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: waveai
          POSTGRES_PASSWORD: waveai_ci
          POSTGRES_DB: waveai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waveai -d waveai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      WAVEAI_API_DATABASE_URL: postgresql+psycopg://waveai:waveai_ci@localhost:5432/waveai_test
      WAVEAI_TEST_REQUIRE_DB: "1"
      # Segredo descartável só deste job (ADR-0023: exigido em todo ambiente).
      WAVEAI_API_JWT_SECRET: ci-secret-nao-usar-fora-do-ci-0123456789abcdef
      # Chave Fernet descartável só do CI (ADR-0026).
      WAVEAI_API_RESULT_ENCRYPTION_KEY: sRzpGGMSAff35dzYCgpeXTyI2rMfVLkVtN_nu5bhwTE=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  compose-smoke:
    # Aceite da #5: `docker compose up` sobe o stack e os serviços respondem.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      # O compose exige estes segredos (fail-closed); aqui, descartáveis.
      WAVEAI_API_JWT_SECRET: ci-secret-nao-usar-fora-do-ci-0123456789abcdef
      WAVEAI_API_RESULT_ENCRYPTION_KEY: sRzpGGMSAff35dzYCgpeXTyI2rMfVLkVtN_nu5bhwTE=
    steps:
      - uses: actions/checkout@v4
      - name: Subir o stack
        run: docker compose up -d --build --wait
      - name: Health checks
        run: |
          curl -fsS http://localhost:8000/health | tee /dev/stderr | grep -q '"ok"'
          curl -fsS http://localhost:8001/health | tee /dev/stderr | grep -q '"ok"'
      - name: Demo de análise ponta a ponta
        run: |
          curl -fsS -X POST http://localhost:8001/analyze/demo \
            | tee /dev/stderr | grep -q '"verdict"'
      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs
      - name: Derrubar
        if: always()
        run: docker compose down -v

  typecheck-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wave-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # Contraste AA é critério de aceite da #18: se alguém mexer numa cor e
      # quebrar a legibilidade, o CI reprova em vez de depender de revisão visual.
      - name: Contraste (WCAG AA)
        run: npm run check:contrast

  test-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install wave-eeg (dependência local do monorepo)
        run: pip install -e ../../packages/wave-eeg
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  test-corpus:
    # Corpus de pesquisa (ADR-0030): store Parquet content-addressed + índice.
    # Testes 100% sintéticos com SQLite/tmp — sem serviço de banco.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/wave-corpus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  lint-vocabulary:
    # Guarda o vocabulário não-clínico (ADR-0032): "anomalia" foi abandonado em
    # código/UI e na estratégia de sinal (DataScience/30). Registros de decisão
    # (ADRs, perguntas em aberto) podem citá-lo para explicar o abandono, e
    # ficam fora do escopo do guard de propósito.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Termos proibidos (ADR-0032)
        run: bash infra/scripts/check_forbidden_terms.sh
